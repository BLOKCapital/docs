name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default token.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run check:content

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # Informational for now: a known high-severity advisory lives in a
      # transitive dep whose fix is a breaking major bump. Make this a hard gate
      # (drop continue-on-error) once that's resolved. Dependabot tracks fixes.
      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
